name: CI — AI Agent

on:
  push:
    branches: [main]
    paths:
      - "apps/ai_engine/**"
      - ".github/workflows/ci-ai-agent.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/ai_engine/**"
      - ".github/workflows/ci-ai-agent.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/ai_engine/requirements.txt

      - name: Install dependencies
        working-directory: apps/ai_engine
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests
        working-directory: apps/ai_engine
        env:
          # Must match the keys the test fixtures send (see tests/conftest.py).
          INTERNAL_API_KEY: test-internal-key
          CLAUDE_API_KEY: test-claude-key
        # NOTE: do not swallow the exit code — failing/erroring tests must fail CI.
        # Integration tests require Postgres/Redis + a live backend and are run
        # separately (see tests/integration); they are excluded from the unit run.
        run: pytest tests/ --ignore=tests/integration -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-engine-coverage
          path: apps/ai_engine/coverage.xml
          if-no-files-found: ignore

      - name: Type check
        working-directory: apps/ai_engine
        run: python -m py_compile main.py config/settings.py api/middleware/internal_key_auth.py
