name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/backend/**"
      - ".github/workflows/ci-backend.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: secureai_test
          POSTGRES_USER: secureai
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secureai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      # Build & test: 빌드 + 테스트 실행.
      # 알려진 6개 실패 테스트(VulnerabilityServiceTest 2 + DomainVerificationRedisIT 4)로 인해
      # 현재 이 스텝은 exit 1이 된다. continue-on-error: true로 다음 스텝이 실행되도록 한다.
      # 참고: 기존 테스트 실패 6건은 TASK-1203 범위가 아님 — 별도 fix 태스크에서 처리.
      - name: Build & test
        id: build-test
        working-directory: apps/backend
        continue-on-error: true
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/secureai_test
          SPRING_DATASOURCE_USERNAME: secureai
          SPRING_DATASOURCE_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: ci-test-secret-key-at-least-64-characters-long-for-testing-only
          SECUREAI_ENCRYPTION_KEY: 0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20
        run: ./gradlew build --no-daemon

      # 커버리지 리포트 생성 — test가 실패했어도 JaCoCo 실행 데이터(.exec)는 생성되므로 리포트 생성 가능.
      # jacocoTestReport는 test task에 finalizedBy로 연결되어 있지만, Gradle이 test 실패 시
      # finalizer를 스킵하는 경우가 있으므로 별도 스텝에서 명시적으로 실행한다.
      - name: Generate JaCoCo report
        if: always()
        working-directory: apps/backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/secureai_test
          SPRING_DATASOURCE_USERNAME: secureai
          SPRING_DATASOURCE_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: ci-test-secret-key-at-least-64-characters-long-for-testing-only
          SECUREAI_ENCRYPTION_KEY: 0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20
        run: ./gradlew jacocoTestReport --no-daemon

      # 라인 커버리지 게이트 — 현재 임계 58% (실측 59.73%, 안전 마진 2% 적용)
      # 점진 상향: Sprint13 → 65%, Sprint14 → 70%
      # jacocoTestReport XML이 이미 생성됐으므로 verification만 실행된다(test 재실행 없음).
      - name: Coverage gate (JaCoCo line ≥ 58%)
        if: always()
        working-directory: apps/backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/secureai_test
          SPRING_DATASOURCE_USERNAME: secureai
          SPRING_DATASOURCE_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: ci-test-secret-key-at-least-64-characters-long-for-testing-only
          SECUREAI_ENCRYPTION_KEY: 0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      # Build & test 스텝의 실제 결과를 반영 — test 실패 시 이 스텝이 전체 Job을 실패시킨다.
      - name: Fail if build-test failed
        if: steps.build-test.outcome == 'failure'
        run: |
          echo "Build & test 스텝이 실패했습니다. 테스트 리포트를 확인하세요."
          exit 1

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/backend/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: apps/backend/build/reports/tests/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/build/reports/jacoco/
          if-no-files-found: ignore
