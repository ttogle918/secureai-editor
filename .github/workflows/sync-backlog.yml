name: Sync Backlog to GitHub Projects
on:
  push:
    branches:
      - main
    paths:
      - 'docs/07_SPRINT_BACKLOG_V2.md'
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Sync Script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./scripts/gh_import_issues.sh
          ./scripts/gh_import_issues.sh --sync