spring:
  application:
    name: secureai-backend

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/secureai}
    username: ${SPRING_DATASOURCE_USERNAME:secureai}
    password: ${SPRING_DATASOURCE_PASSWORD:secureai}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080
  error:
    include-message: never

spring.mvc:
  throw-exception-if-no-handler-found: true

spring.web.resources:
  add-mappings: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

secureai:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-seconds: 900
    refresh-token-expiry-seconds: 2592000
  encryption:
    key: ${SECUREAI_ENCRYPTION_KEY}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
  ai-agent:
    url: ${AI_AGENT_URL:http://localhost:8000}
  internal-api-key: ${INTERNAL_API_KEY}
  nvd:
    api-key: ${NVD_API_KEY:}

firebase:
  # Firebase를 활성화하려면 true로 설정. 개발 환경에서는 false(no-op 동작).
  enabled: false
  # 서비스 계정 JSON 파일 경로 (firebase.enabled=true 일 때 필수)
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

resilience4j:
  circuitbreaker:
    instances:
      aiAgent:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      nvdApi:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 120s
      dnsLookup:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 60s
  timelimiter:
    instances:
      aiAgent:
        timeoutDuration: 30s
      nvdApi:
        timeoutDuration: 15s
