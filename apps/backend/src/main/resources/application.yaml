spring:
  application:
    name: secureai-backend

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/secureai}
    username: ${SPRING_DATASOURCE_USERNAME:secureai}
    password: ${SPRING_DATASOURCE_PASSWORD:secureai}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true
    locations: classpath:db/migration
    placeholders:
      mcp-ro-password: ${MCP_RO_PASSWORD:changeme_mcp_ro}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080
  forward-headers-strategy: NATIVE
  error:
    include-message: never

spring.mvc:
  throw-exception-if-no-handler-found: true

spring.web.resources:
  add-mappings: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    # 메일 health indicator는 매 /actuator/health 호출마다 실시간 SMTP 로그인을 수행한다.
    # k8s liveness/readiness 프로브나 부하 시 SMTP 서버가 "로그인 시도 과다"로 계정을 락 → health DOWN 연쇄.
    # 메일 발송 기능과 무관하게 프로브에서만 제외한다. (TASK-1105 부하검증에서 발견)
    mail:
      enabled: false
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

secureai:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-seconds: 900
    refresh-token-expiry-seconds: 2592000
  encryption:
    key: ${SECUREAI_ENCRYPTION_KEY}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
    # GitHub App ID (숫자 형식, OAuth Client ID와 별개)
    check-run-app-id: ${GITHUB_APP_ID:}
    # GitHub App RSA Private Key (PEM 인라인 — 개행은 \n으로 이스케이프하여 환경변수에 설정)
    # appPrivateKeyPath와 상호 배타적: 인라인 키가 있으면 경로는 무시됨
    app-private-key: ${GITHUB_APP_PRIVATE_KEY:}
    # GitHub App RSA Private Key 파일 경로 (GITHUB_APP_PRIVATE_KEY 미설정 시 대체 사용)
    app-private-key-path: ${GITHUB_APP_PRIVATE_KEY_PATH:}
  ai-agent:
    url: ${AI_AGENT_URL:http://localhost:8000}
  internal-api-key: ${INTERNAL_API_KEY}
  nvd:
    api-key: ${NVD_API_KEY:}
  slack:
    webhook-url: ${SECUREAI_SLACK_WEBHOOK_URL:}

firebase:
  # Firebase를 활성화하려면 true로 설정. 개발 환경에서는 false(no-op 동작).
  enabled: false
  # 서비스 계정 JSON 파일 경로 (firebase.enabled=true 일 때 필수)
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

resilience4j:
  circuitbreaker:
    instances:
      aiAgent:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      nvdApi:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 120s
      dnsLookup:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 60s
  timelimiter:
    instances:
      aiAgent:
        timeoutDuration: 30s
      nvdApi:
        timeoutDuration: 15s
