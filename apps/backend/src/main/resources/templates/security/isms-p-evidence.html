<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8"/>
<title>ISMS-P 개발보안 통제항목 이행현황</title>
<style>
  body     { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; margin: 40px; color: #1a1a1a; font-size: 12px; }
  h1       { font-size: 20px; border-bottom: 2px solid #7c3aed; padding-bottom: 8px; }
  h2       { font-size: 14px; color: #7c3aed; margin-top: 24px; }
  table    { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th       { background: #7c3aed; color: #fff; padding: 7px 9px; text-align: left; }
  td       { border: 1px solid #c4b5fd; padding: 6px 9px; vertical-align: top; }
  tr:nth-child(even) td { background: #faf5ff; }
  .impl    { color: #16a34a; font-weight: 700; }
  .partial { color: #d97706; font-weight: 700; }
  .none    { color: #dc2626; font-weight: 700; }
  .na      { color: #6b7280; }
  .meta    { font-size: 11px; color: #555; margin-bottom: 4px; }
  .footer  { margin-top: 36px; border-top: 1px solid #ddd; padding-top: 8px; font-size: 10px; color: #888; }
</style>
</head>
<body>

<h1>ISMS-P 개발보안 통제항목 이행현황</h1>
<div class="meta">프로젝트: <strong th:text="${projectName}">-</strong></div>
<div class="meta">생성일시: <strong th:text="${generatedAt}">-</strong></div>
<div class="meta" style="margin-bottom:16px;">
  이행: <strong th:text="${implementedCount}" style="color:#16a34a">0</strong> /
  부분이행: <strong th:text="${partialCount}" style="color:#d97706">0</strong> /
  미이행: <strong th:text="${noneCount}" style="color:#dc2626">0</strong>
</div>

<h2>개발보안 통제항목 이행현황</h2>
<table>
  <thead>
    <tr>
      <th style="width:16%">통제항목번호</th>
      <th style="width:28%">통제항목명</th>
      <th style="width:18%">이행현황</th>
      <th style="width:24%">근거 (관련 취약점 / 조치)</th>
      <th style="width:14%">심사 의견</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="ctrl : ${controlItems}">
      <td th:text="${ctrl.controlId}">-</td>
      <td th:text="${ctrl.controlName}">-</td>
      <td>
        <span th:if="${ctrl.implementationStatus == 'IMPLEMENTED'}" class="impl">이행</span>
        <span th:if="${ctrl.implementationStatus == 'PARTIAL'}"     class="partial">부분이행</span>
        <span th:if="${ctrl.implementationStatus == 'NOT_IMPLEMENTED'}" class="none">미이행</span>
        <span th:if="${ctrl.implementationStatus == 'NA'}"          class="na">해당없음</span>
      </td>
      <td th:text="${ctrl.evidence}">-</td>
      <td th:text="${ctrl.auditorNote}">-</td>
    </tr>
  </tbody>
</table>

<div class="footer">
  ISMS-P(정보보호 및 개인정보보호 관리체계 인증) 개발보안 통제 기준.
  본 보고서는 SecureAI Engine에 의해 자동 생성되었습니다.
  생성일시: <span th:text="${generatedAt}">-</span>
</div>
</body>
</html>
