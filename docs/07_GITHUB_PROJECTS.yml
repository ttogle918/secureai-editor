# SecureAI — GitHub Projects 자동 등록 설정
# 사용법:
#   1. GitHub CLI(gh) 설치: https://cli.github.com
#   2. 인증: gh auth login
#   3. 스크립트 실행: bash setup_github_projects.sh
#   또는 GitHub Actions workflow로 실행 (아래 workflow 파일 참고)
#
# 이 파일은 GitHub Projects v2 GraphQL API 기반으로 동작합니다.

project:
  title: "SecureAI Development Board"
  description: "AI 기반 보안 감사 에이전트 — 전체 개발 칸반보드"
  visibility: "private"  # private / public

# 칸반 컬럼 (Status 필드)
columns:
  - name: "📋 Backlog"
    description: "대기 중인 작업"
  - name: "🏃 In Progress"
    description: "현재 진행 중"
  - name: "🔍 Review"
    description: "코드 리뷰 / QA"
  - name: "✅ Done"
    description: "완료"

# 커스텀 필드
custom_fields:
  - name: "Sprint"
    type: "SINGLE_SELECT"
    options:
      - "Sprint 0 — 환경 세팅"
      - "Sprint 1 — 인증·프로젝트"
      - "Sprint 2 — AI Agent·MCP"
      - "Sprint 3 — SAST·GitHub 기초"
      - "Sprint 4 — 웹 UI·SSE"
      - "Sprint 5 — GitHub Layer 2"
      - "Sprint 6 — DAST 엔진"
      - "Sprint 7 — 리포트·대시보드·Android"
      - "Sprint 8 — 안정화"
      - "Sprint 9 — Phase 3"

  - name: "Priority"
    type: "SINGLE_SELECT"
    options:
      - "🔴 Critical"
      - "🟠 High"
      - "🟡 Medium"
      - "🟢 Low"

  - name: "Service"
    type: "SINGLE_SELECT"
    options:
      - "Backend (Spring Boot)"
      - "AI Agent (Python)"
      - "MCP Server (Node.js)"
      - "Frontend (Next.js)"
      - "Android (Kotlin)"
      - "DAST Sandbox"
      - "Infra / DevOps"
      - "전체 공통"

  - name: "Story Points"
    type: "NUMBER"

  - name: "EPIC"
    type: "SINGLE_SELECT"
    options:
      - "EPIC-0: 프로젝트 기반"
      - "EPIC-1: 인증 시스템"
      - "EPIC-2: 프로젝트 관리"
      - "EPIC-3: AI 에이전트 기반"
      - "EPIC-4: SAST 파이프라인"
      - "EPIC-5: 웹 UI"
      - "EPIC-6: GitHub Layer 2"
      - "EPIC-7: DAST 동적 분석"
      - "EPIC-8: 리포트·대시보드"
      - "EPIC-9: Android"
      - "EPIC-10: 안정화"
      - "EPIC-11: Phase 3"

