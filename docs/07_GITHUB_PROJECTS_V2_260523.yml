project:
  title: "SecureAI Development Board"
  description: "AI 기반 보안 감사 에이전트 — 전체 개발 칸반보드"
  visibility: "private"

columns:
  - name: "📋 Backlog"
  - name: "🏃 In Progress"
  - name: "🔍 Review"
  - name: "✅ Done"

custom_fields:
  - name: "Sprint"
    type: "SINGLE_SELECT"
    options:
      - "Sprint 0 — 환경 세팅"
      - "Sprint 1 — 인증·프로젝트"
      - "Sprint 2 — AI Agent·체크포인트"
      - "Sprint 3 — SAST·GitHub 기초"
      - "Sprint 4 — 웹 UI·체크리스트"
      - "Sprint 5 — GitHub Layer 2"
      - "Sprint 6 — DAST 엔진"
      - "Sprint 7 — 리포트·대시보드·Android"
      - "Sprint 8 — 안정화"
      - "Sprint 9 — Phase 3"

  - name: "Priority"
    type: "SINGLE_SELECT"
    options: ["🔴 Critical", "🟠 High", "🟡 Medium", "🟢 Low"]

  - name: "Service"
    type: "SINGLE_SELECT"
    options:
      - "Backend (Spring Boot)"
      - "AI Agent (Python)"
      - "MCP Server (Node.js)"
      - "Frontend (Next.js)"
      - "Android (Kotlin)"
      - "DAST Sandbox"
      - "Infra / DevOps"
      - "전체 공통"

  - name: "Story Points"
    type: "NUMBER"

  - name: "Test Coverage"
    type: "SINGLE_SELECT"
    options: ["미작성", "진행중", "완료"]

