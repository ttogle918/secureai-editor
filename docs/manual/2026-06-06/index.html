<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagori — SecureAI 사용자 매뉴얼 (2026-06-06)</title>
<style>
  /* ===== Pagori Design Tokens (Dark OLED + Orange) ===== */
  :root{
    --bg-0:#080809; --bg-1:#0d0d0f; --bg-2:#111114; --bg-3:#161619; --bg-4:#1c1c20;
    --border:#1f1f24; --border-2:#2a2a30; --border-3:#3a3a44;
    --tp:#f1f1f6; --ts:#b4b4be; --tt:#74747e; --ta:#ffffff;
    --orange:#f97316; --orange-2:#ea580c;
    --critical:#f04141; --high:#f59e0b; --medium:#eab308; --low:#22c55e; --info:#569cd6;
    --indigo:#818cf8; --emerald:#34d399;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg-0); color:var(--tp);
    font-family:'Pretendard','Segoe UI',-apple-system,system-ui,sans-serif;
    font-size:14px; line-height:1.55; display:flex; height:100vh; overflow:hidden;
  }
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--border-3);border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ===== Layout ===== */
  #sidebar{
    width:268px; flex-shrink:0; background:var(--bg-1); border-right:1px solid var(--border);
    display:flex; flex-direction:column; height:100%;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:18px 18px 14px;border-bottom:1px solid var(--border)}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--orange),var(--orange-2));
    display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px;box-shadow:0 0 18px rgba(249,115,22,.4)}
  .brand b{font-size:16px;letter-spacing:.3px}
  .brand .sub{font-size:11px;color:var(--tt)}
  .navlist{flex:1;overflow-y:auto;padding:10px 8px}
  .navcat{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--tt);padding:14px 12px 6px}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--ts);
    font-size:13px;transition:.12s;user-select:none}
  .navitem:hover{background:var(--bg-3);color:var(--tp)}
  .navitem.active{background:rgba(249,115,22,.13);color:var(--orange);font-weight:600}
  .navitem .ic{width:20px;text-align:center;font-size:15px}
  .navitem .num{margin-left:auto;font-size:11px;color:var(--tt);background:var(--bg-3);border-radius:20px;padding:1px 7px}
  .sidefoot{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--tt)}

  /* ===== Main ===== */
  #main{flex:1;display:flex;flex-direction:column;height:100%;min-width:0}
  #topbar{height:60px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg-1);
    display:flex;align-items:center;gap:16px;padding:0 24px}
  #topbar .ftitle{font-size:16px;font-weight:700;display:flex;align-items:center;gap:9px}
  #topbar .ftitle .ic{font-size:20px}
  #progresswrap{margin-left:auto;display:flex;align-items:center;gap:14px}
  .pill{font-size:12px;color:var(--ts);background:var(--bg-3);border:1px solid var(--border-2);border-radius:20px;padding:5px 12px}
  .pill b{color:var(--orange)}
  .pbar{width:160px;height:6px;background:var(--bg-3);border-radius:6px;overflow:hidden}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-2));transition:.3s;border-radius:6px}

  #stage{flex:1;overflow-y:auto;padding:26px 34px;position:relative}
  .stephead{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px;max-width:1000px}
  .stepnum{flex-shrink:0;width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--orange),var(--orange-2));
    display:grid;place-items:center;font-weight:800;font-size:18px;color:#fff;box-shadow:0 4px 16px rgba(249,115,22,.35)}
  .stephead h2{font-size:18px;margin-bottom:3px}
  .stephead p{color:var(--ts);font-size:13.5px}
  .stepnote{max-width:1000px;background:var(--bg-2);border:1px solid var(--border-2);border-left:3px solid var(--orange);
    border-radius:10px;padding:13px 16px;margin-bottom:20px;font-size:13.5px;color:var(--ta)}
  .stepnote .tag{display:inline-block;font-size:11px;font-weight:700;color:var(--orange);margin-right:8px;
    border:1px solid rgba(249,115,22,.4);border-radius:6px;padding:1px 7px}
  .tip{background:rgba(86,156,214,.08);border-left-color:var(--info)}
  .tip .tag{color:var(--info);border-color:rgba(86,156,214,.4)}
  .warn{background:rgba(240,65,65,.07);border-left-color:var(--critical)}
  .warn .tag{color:var(--critical);border-color:rgba(240,65,65,.4)}

  /* ===== Mock app chrome ===== */
  .mock{max-width:1000px;background:var(--bg-1);border:1px solid var(--border-2);border-radius:14px;overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .mockbar{height:38px;background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 14px}
  .dot{width:11px;height:11px;border-radius:50%}
  .url{margin-left:12px;font-size:11.5px;color:var(--tt);background:var(--bg-0);border:1px solid var(--border);
    border-radius:7px;padding:4px 12px;flex:1;max-width:420px}
  .mhdr{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--bg-1)}
  .mlogo{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--orange),var(--orange-2));
    display:grid;place-items:center;font-weight:800;color:#fff;font-size:13px}
  .mhdr .mnav{display:flex;gap:6px;margin-left:6px}
  .mhdr .mnav span{font-size:12.5px;color:var(--ts);padding:5px 10px;border-radius:7px}
  .mhdr .mnav span.on{color:var(--orange);background:rgba(249,115,22,.12)}
  .mhdr .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .badge{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border-2);color:var(--ts)}
  .badge.dev{color:var(--indigo);border-color:rgba(129,140,248,.4);background:rgba(129,140,248,.1)}
  .badge.sec{color:var(--orange);border-color:rgba(249,115,22,.4);background:rgba(249,115,22,.1)}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--bg-4);display:grid;place-items:center;font-size:12px}
  .mbody{padding:20px;min-height:230px;background:var(--bg-1)}

  /* generic mock elements */
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--ts);margin-bottom:6px}
  .input{background:var(--bg-0);border:1px solid var(--border-2);border-radius:9px;padding:11px 13px;font-size:13px;color:var(--tp);width:100%}
  .input.ph{color:var(--tt)}
  .check{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ts);margin-bottom:9px}
  .box{width:18px;height:18px;border-radius:5px;border:1.6px solid var(--border-3);flex-shrink:0;display:grid;place-items:center;font-size:12px}
  .box.on{background:var(--orange);border-color:var(--orange);color:#fff}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--orange),var(--orange-2));
    color:#fff;font-weight:700;font-size:13px;border:none;border-radius:9px;padding:11px 18px;cursor:pointer}
  .btn.ghost{background:var(--bg-3);color:var(--tp);border:1px solid var(--border-2)}
  .btn.gh{background:#1f2328;color:#fff}
  .btn.sm{padding:7px 13px;font-size:12px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .col{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--bg-2);border:1px solid var(--border-2);border-radius:11px;padding:15px}
  .muted{color:var(--tt);font-size:12px}
  .h3{font-size:13.5px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .sev{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px}
  .sev.c{color:var(--critical);background:rgba(240,65,65,.13)}
  .sev.h{color:var(--high);background:rgba(245,158,11,.13)}
  .sev.m{color:var(--medium);background:rgba(234,179,8,.13)}
  .sev.l{color:var(--low);background:rgba(34,197,94,.13)}
  .vrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:9px;background:var(--bg-2);margin-bottom:8px}
  .vrow .nm{font-size:12.5px}
  .vrow .fp{margin-left:auto;font-size:11px;color:var(--tt)}
  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:14px}
  .tabs span{font-size:12.5px;color:var(--ts);padding:8px 13px;border-bottom:2px solid transparent}
  .tabs span.on{color:var(--orange);border-bottom-color:var(--orange)}
  .tree{font-size:12.5px;color:var(--ts)}
  .tree .f{padding:4px 8px;border-radius:6px;display:flex;gap:7px;align-items:center}
  .tree .f.on{background:rgba(249,115,22,.1);color:var(--orange)}
  .acc{border:1px solid var(--border);border-radius:9px;margin-bottom:8px;overflow:hidden}
  .acc .ah{display:flex;align-items:center;gap:9px;padding:10px 13px;background:var(--bg-2);font-size:12.5px}
  .acc .ah .pct{margin-left:auto;color:var(--orange);font-weight:700}
  .acc .ab{height:5px;background:var(--bg-3)}
  .acc .ab i{display:block;height:100%;background:var(--orange)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .kpi{background:var(--bg-2);border:1px solid var(--border-2);border-radius:11px;padding:14px}
  .kpi .v{font-size:22px;font-weight:800}
  .kpi .l{font-size:11px;color:var(--tt);margin-top:3px}
  .chatbubble{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange-2));
    display:grid;place-items:center;font-size:22px;box-shadow:0 6px 22px rgba(249,115,22,.45)}
  .donut{width:96px;height:96px;border-radius:50%;
    background:conic-gradient(var(--critical) 0 32%,var(--high) 32% 55%,var(--medium) 55% 78%,var(--low) 78% 100%);
    -webkit-mask:radial-gradient(circle 30px at 50% 50%,transparent 98%,#000 100%);mask:radial-gradient(circle 30px at 50% 50%,transparent 98%,#000 100%)}
  .modal{position:relative;background:var(--bg-2);border:1px solid var(--border-3);border-radius:13px;padding:18px;max-width:380px;margin:8px auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}

  /* ===== RED HIGHLIGHT (요청: 빨간 네모 테두리로 클릭 유도) ===== */
  .hl{position:relative;outline:3px dashed var(--critical)!important;outline-offset:4px;border-radius:10px;
    animation:pulse 1.25s ease-in-out infinite; z-index:5}
  @keyframes pulse{0%,100%{outline-color:#f04141;box-shadow:0 0 0 0 rgba(240,65,65,.35)}
    50%{outline-color:#ff7676;box-shadow:0 0 0 8px rgba(240,65,65,0)}}
  .hl::after{content:"👆 " attr(data-hint);position:absolute;top:-34px;left:50%;transform:translateX(-50%);
    background:var(--critical);color:#fff;font-size:11.5px;font-weight:700;white-space:nowrap;padding:4px 10px;border-radius:7px;
    box-shadow:0 4px 12px rgba(240,65,65,.5);animation:bob 1.25s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}

  /* ===== Footer nav ===== */
  #footnav{height:64px;flex-shrink:0;border-top:1px solid var(--border);background:var(--bg-1);
    display:flex;align-items:center;gap:12px;padding:0 24px}
  .navbtn{display:inline-flex;align-items:center;gap:8px;background:var(--bg-3);border:1px solid var(--border-2);
    color:var(--tp);font-size:13px;font-weight:600;border-radius:10px;padding:10px 18px;cursor:pointer;transition:.12s}
  .navbtn:hover{background:var(--bg-4);border-color:var(--border-3)}
  .navbtn.primary{background:linear-gradient(135deg,var(--orange),var(--orange-2));border:none;color:#fff}
  .navbtn:disabled{opacity:.4;cursor:not-allowed}
  .stepdots{display:flex;gap:7px;margin:0 auto}
  .stepdots i{width:9px;height:9px;border-radius:50%;background:var(--border-3);cursor:pointer;transition:.15s}
  .stepdots i.on{background:var(--orange);transform:scale(1.25)}
  .stepdots i.done{background:var(--orange-2)}
  kbd{background:var(--bg-3);border:1px solid var(--border-3);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:11px;color:var(--ts)}
</style>
</head>
<body>
  <aside id="sidebar">
    <div class="brand">
      <div class="logo">P</div>
      <div><b>Pagori 매뉴얼</b><div class="sub">SecureAI · 2026-06-06</div></div>
    </div>
    <div class="navlist" id="navlist"></div>
    <div class="sidefoot">← → 방향키로 단계 이동 · 빨간 점선 = 클릭 위치</div>
  </aside>

  <div id="main">
    <div id="topbar">
      <div class="ftitle"><span class="ic" id="ftIc">🔐</span><span id="ftName">로딩…</span></div>
      <div id="progresswrap">
        <span class="pill">기능 <b id="pFeat">1</b>/<span id="pFeatTot">0</span></span>
        <span class="pill">단계 <b id="pStep">1</b>/<span id="pStepTot">0</span></span>
        <div class="pbar"><i id="pbar"></i></div>
      </div>
    </div>
    <div id="stage"></div>
    <div id="footnav">
      <button class="navbtn" id="prevBtn">← 이전</button>
      <div class="stepdots" id="stepdots"></div>
      <button class="navbtn primary" id="nextBtn">다음 →</button>
    </div>
  </div>

<script>
/* ============================================================
   기능 데이터 — 각 기능은 steps[] 를 가지며,
   step = { t:제목, d:부제, note:{type,tag,html}, screen:목업HTML }
   screen 안에서 class="hl" data-hint="..." 가 빨간 클릭 유도 박스.
   ============================================================ */
const HDR = (active, badge='dev') => `
  <div class="mhdr">
    <div class="mlogo">P</div><b style="font-size:13px">Pagori</b>
    <div class="mnav">
      <span class="${active==='editor'?'on':''}">에디터</span>
      <span class="${active==='dash'?'on':''}">대시보드</span>
      <span class="${active==='team'?'on':''}">팀</span>
      <span class="${active==='settings'?'on':''}">설정</span>
    </div>
    <div class="right">
      <span class="badge ${badge}">${badge==='sec'?'🛡 보안담당':'⬡ 개발자'}</span>
      <div class="avatar">U</div>
    </div>
  </div>`;
const BAR = (url)=>`<div class="mockbar"><span class="dot" style="background:#f04141"></span><span class="dot" style="background:#f59e0b"></span><span class="dot" style="background:#22c55e"></span><span class="url">${url}</span></div>`;

const FEATURES = [
{ ic:'📝', name:'회원가입', cat:'계정',
  steps:[
    { t:'정보 입력', d:'이메일·사용자명·비밀번호를 입력합니다.',
      note:{type:'tip',tag:'규칙',html:'비밀번호는 <b>8자 이상</b>이며 <b>대문자·소문자·숫자</b>를 모두 포함해야 합니다. 사용자명은 영문·숫자·<code>_.-</code>만 가능.'},
      screen:`${BAR('localhost:3000/register')}<div class="mbody"><div style="max-width:360px;margin:0 auto">
        <div class="h3">회원가입</div>
        <div class="field"><label>이메일</label><div class="input ph">you@example.com</div></div>
        <div class="field"><label>사용자명</label><div class="input ph">devuser</div></div>
        <div class="field hl" data-hint="비밀번호 입력"><label>비밀번호</label><div class="input ph">••••••••</div></div>
      </div></div>`},
    { t:'약관 동의', d:'필수 약관에 동의해야 가입이 진행됩니다.',
      note:{type:'warn',tag:'필수',html:'이용약관·개인정보처리방침에 <b>동의하지 않으면 가입이 차단(400)</b>됩니다. 광고성 수신은 선택입니다.'},
      screen:`${BAR('localhost:3000/register')}<div class="mbody"><div style="max-width:360px;margin:0 auto">
        <div class="h3">약관 동의</div>
        <div class="check hl" data-hint="필수 동의 체크"><span class="box on">✓</span> (필수) 이용약관에 동의합니다</div>
        <div class="check"><span class="box on">✓</span> (필수) 개인정보처리방침에 동의합니다</div>
        <div class="check"><span class="box"></span> (선택) 광고성 정보 수신에 동의합니다</div>
      </div></div>`},
    { t:'가입 완료', d:'가입 버튼을 누르면 인증 메일이 발송됩니다.',
      note:{type:'note',tag:'결과',html:'가입 성공 시 <b>이메일 인증 메일</b>이 발송됩니다. 다음 단계에서 인증을 완료하세요.'},
      screen:`${BAR('localhost:3000/register')}<div class="mbody"><div style="max-width:360px;margin:0 auto">
        <div class="h3">회원가입</div>
        <div class="field"><label>이메일</label><div class="input">you@example.com</div></div>
        <div class="field"><label>비밀번호</label><div class="input">••••••••</div></div>
        <button class="btn hl" data-hint="가입하기 클릭" style="width:100%">가입하기</button>
      </div></div>`},
  ]},

{ ic:'✉️', name:'이메일 인증', cat:'계정',
  steps:[
    { t:'인증 링크 클릭', d:'받은 메일의 인증 링크를 클릭합니다.',
      note:{type:'tip',tag:'안내',html:'메일이 안 오면 스팸함을 확인하세요. 인증 토큰은 <b>24시간</b> 유효합니다.'},
      screen:`${BAR('mail · 받은편지함')}<div class="mbody"><div class="card" style="max-width:420px;margin:0 auto">
        <div class="h3">📧 [Pagori] 이메일 인증을 완료해 주세요</div>
        <div class="muted" style="margin-bottom:14px">아래 버튼을 눌러 가입을 완료하세요.</div>
        <button class="btn hl" data-hint="이메일 인증하기">이메일 인증하기</button>
      </div></div>`},
    { t:'인증 완료', d:'인증이 끝나면 로그인할 수 있습니다.',
      note:{type:'note',tag:'결과',html:'“인증 완료” 화면이 보이면 <b>로그인</b> 단계로 이동하세요.'},
      screen:`${BAR('localhost:3000/auth/verify-email')}<div class="mbody"><div style="text-align:center;padding:30px">
        <div style="font-size:46px">✅</div><div class="h3" style="justify-content:center;margin-top:10px">이메일 인증 완료</div>
        <div class="muted">이제 로그인하여 Pagori를 시작할 수 있습니다.</div>
        <div style="margin-top:18px"><button class="btn hl" data-hint="로그인하러 가기">로그인하러 가기</button></div>
      </div></div>`},
  ]},

{ ic:'🔐', name:'로그인', cat:'계정',
  steps:[
    { t:'이메일 로그인', d:'이메일과 비밀번호를 입력하고 로그인합니다.',
      note:{type:'warn',tag:'보안',html:'비밀번호 <b>5회 연속 실패 시 15분간 잠금</b>됩니다(무차별 대입 방어).'},
      screen:`${BAR('localhost:3000/login')}<div class="mbody"><div style="max-width:340px;margin:0 auto">
        <div class="h3">로그인</div>
        <div class="field"><label>이메일</label><div class="input">you@example.com</div></div>
        <div class="field"><label>비밀번호</label><div class="input">••••••••</div></div>

/* ============================================================
   렌더링 엔진
   ============================================================ */
let fi=0, si=0;
const $=s=>document.querySelector(s);
const navlist=$('#navlist'), stage=$('#stage');

function buildNav(){
  let html='', lastCat='';
  FEATURES.forEach((f,i)=>{
    if(f.cat!==lastCat){ html+=`<div class="navcat">${f.cat}</div>`; lastCat=f.cat; }
    html+=`<div class="navitem" data-i="${i}"><span class="ic">${f.ic}</span><span>${f.name}</span><span class="num">${f.steps.length}</span></div>`;
  });
  navlist.innerHTML=html;
  navlist.querySelectorAll('.navitem').forEach(el=>el.onclick=()=>{fi=+el.dataset.i;si=0;render();});
}
function render(){
  const f=FEATURES[fi], s=f.steps[si];
  // sidebar active
  navlist.querySelectorAll('.navitem').forEach(el=>el.classList.toggle('active',+el.dataset.i===fi));
  // topbar
  $('#ftIc').textContent=f.ic; $('#ftName').textContent=f.name;
  $('#pFeat').textContent=fi+1; $('#pFeatTot').textContent=FEATURES.length;
  $('#pStep').textContent=si+1; $('#pStepTot').textContent=f.steps.length;
  // overall progress
  let done=0,total=0; FEATURES.forEach((ff,i)=>{total+=ff.steps.length; if(i<fi)done+=ff.steps.length; if(i===fi)done+=si;});
  $('#pbar').style.width=Math.round((done/(total-1||1))*100)+'%';
  // stage
  const n=s.note||{type:'note',tag:'',html:''};
  stage.innerHTML=`
    <div class="stephead"><div class="stepnum">${si+1}</div><div><h2>${s.t}</h2><p>${s.d}</p></div></div>
    ${n.html?`<div class="stepnote ${n.type==='tip'?'tip':n.type==='warn'?'warn':''}"><span class="tag">${n.tag||'안내'}</span>${n.html}</div>`:''}
    <div class="mock">${s.screen}</div>`;
  stage.scrollTop=0;
  // step dots
  $('#stepdots').innerHTML=f.steps.map((_,i)=>`<i class="${i===si?'on':i<si?'done':''}" data-s="${i}"></i>`).join('');
  $('#stepdots').querySelectorAll('i').forEach(d=>d.onclick=()=>{si=+d.dataset.s;render();});
  // nav buttons
  $('#prevBtn').disabled=(fi===0&&si===0);
  const isLast=(fi===FEATURES.length-1&&si===f.steps.length-1);
  $('#nextBtn').textContent=isLast?'처음으로 ↺':(si===f.steps.length-1?'다음 기능 →':'다음 →');
}
function go(d){
  const f=FEATURES[fi];
  if(d>0){
    if(si<f.steps.length-1)si++;
    else if(fi<FEATURES.length-1){fi++;si=0;}
    else {fi=0;si=0;}
  }else{
    if(si>0)si--;
    else if(fi>0){fi--;si=FEATURES[fi].steps.length-1;}
  }
  render();
}
$('#nextBtn').onclick=()=>go(1);
$('#prevBtn').onclick=()=>go(-1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')go(1);
  if(e.key==='ArrowLeft')go(-1);
});
buildNav(); render();
</script>
