<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureAI — Session Log Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    :root {
      --bg:          #0d1117;
      --sidebar-bg:  #161b22;
      --border:      #21262d;
      --border-2:    #30363d;
      --text:        #e6edf3;
      --text-muted:  #7d8590;
      --text-dim:    #8b949e;
      --accent:      #388bfd;
      --accent-glow: rgba(56,139,253,0.15);
      --green:       #3fb950;
      --green-bg:    rgba(46,160,67,0.15);
      --purple-bg:   rgba(163,113,247,0.15);
      --purple:      #bc8cff;
      --sidebar-w:   290px;
      --header-h:    56px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    /* ─── HEADER ─── */
    header {
      height: var(--header-h);
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #388bfd 0%, #a371f7 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      box-shadow: 0 0 12px rgba(56,139,253,0.35);
      flex-shrink: 0;
    }
    .logo-text { line-height: 1.25; }
    .logo-title { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; }
    .logo-sub   { font-size: 11px; color: var(--text-muted); }

    .header-divider {
      width: 1px; height: 22px;
      background: var(--border);
      margin: 0 4px;
    }

    .header-stats {
      display: flex;
      gap: 18px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 4px var(--accent);
    }

    .header-shortcut {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 5px;
    }
    kbd {
      background: var(--border);
      border: 1px solid var(--border-2);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 10px;
      color: var(--text-dim);
      font-family: inherit;
    }

    /* ─── LAYOUT ─── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-label {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--text-muted);
    }
    .sidebar-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 16px;
    }

    .session-item {
      padding: 11px 16px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
    }
    .session-item:hover {
      background: rgba(255,255,255,0.04);
      border-left-color: var(--border-2);
    }
    .session-item.active {
      background: var(--accent-glow);
      border-left-color: var(--accent);
    }

    .item-date {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .recent-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 5px var(--green);
      flex-shrink: 0;
    }
    .item-scope {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .item-branch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--green-bg);
      color: var(--green);
      font-family: 'SF Mono', 'Consolas', monospace;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── MAIN ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* content header */
    .content-hd {
      padding: 18px 40px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }
    .content-hd-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }
    .content-hd-badges {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .badge-blue   { background: rgba(56,139,253,0.15); color: #58a6ff; }
    .badge-green  { background: var(--green-bg); color: var(--green); font-family: 'SF Mono','Consolas',monospace; }
    .badge-purple { background: var(--purple-bg); color: var(--purple); }

    /* scroll area */
    .content-scroll {
      flex: 1;
      overflow-y: auto;
    }
    .content-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 40px 60px;
    }

    /* ─── MARKDOWN ─── */
    .md h1, .md h2, .md h3, .md h4 {
      color: var(--text);
      font-weight: 700;
      line-height: 1.4;
      margin-top: 32px;
      margin-bottom: 14px;
    }
    .md h1 {
      font-size: 1.6em;
      margin-top: 0;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .md h2 {
      font-size: 1.25em;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .md h3 { font-size: 1.08em; }
    .md h4 { font-size: 0.95em; color: var(--text-dim); }

    .md p { color: var(--text); line-height: 1.75; margin-bottom: 14px; }
    .md strong { color: var(--text); font-weight: 600; }
    .md em { color: var(--text-dim); }
    .md a { color: #58a6ff; text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md del { color: var(--text-muted); }

    .md ul, .md ol {
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 14px;
      padding-left: 22px;
    }
    .md li { margin-bottom: 5px; }
    .md li > ul, .md li > ol { margin-bottom: 0; margin-top: 4px; }

    /* Task list */
    .md input[type="checkbox"] {
      margin-right: 6px;
      accent-color: var(--accent);
      cursor: default;
    }

    /* Table */
    .md table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      font-size: 13.5px;
      display: block;
      overflow-x: auto;
    }
    .md thead th {
      background: rgba(255,255,255,0.05);
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 9px 14px;
      border: 1px solid var(--border);
      white-space: nowrap;
      text-align: left;
    }
    .md td {
      padding: 9px 14px;
      border: 1px solid var(--border);
      color: var(--text);
      vertical-align: top;
      line-height: 1.55;
    }
    .md tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .md tr:hover td { background: rgba(255,255,255,0.04); }

    /* Code */
    .md code {
      font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
      font-size: 12.5px;
      background: rgba(110,118,129,0.1);
      color: #e6edf3;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(110,118,129,0.2);
    }
    .md pre {
      background: #161b22 !important;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      overflow-x: auto;
      margin-bottom: 18px;
      position: relative;
    }
    .md pre code {
      background: none !important;
      border: none !important;
      padding: 0;
      font-size: 13px;
      line-height: 1.65;
      color: inherit;
    }

    /* Blockquote */
    .md blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 18px;
      background: var(--accent-glow);
      border-radius: 0 8px 8px 0;
      margin-bottom: 16px;
    }
    .md blockquote p { color: var(--text-dim); margin-bottom: 0; }

    /* HR */
    .md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ─── EMPTY / SPLASH ─── */
    .splash {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text-muted);
      user-select: none;
    }
    .splash-icon { font-size: 48px; opacity: 0.4; }
    .splash-text { font-size: 14px; }
    .splash-hint {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 16px;
      font-family: 'SF Mono', 'Consolas', monospace;
      opacity: 0.7;
    }

    /* ─── FADE-IN ANIMATION ─── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.2s ease forwards; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">🛡️</div>
    <div class="logo-text">
      <div class="logo-title">SecureAI Engine</div>
      <div class="logo-sub">Session Log Viewer</div>
    </div>
  </div>
  <div class="header-divider"></div>
  <div class="header-stats" id="js-stats"></div>
  <div class="header-shortcut">
    <kbd>↑</kbd><kbd>↓</kbd> 탐색 &nbsp;·&nbsp; <kbd>Enter</kbd> 열기
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-label">세션 기록</div>
      <div class="sidebar-meta" id="js-meta"></div>
    </div>
    <div class="sidebar-scroll" id="js-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="js-main">
    <div class="splash" id="js-splash">
      <div class="splash-icon">📋</div>
      <div class="splash-text">세션 로그를 선택하세요</div>
    </div>
  </main>
</div>

<!-- DATA (generated by build_session_log.py) -->
<script src="logs-data.js" onerror="window.SESSION_LOGS=[]"></script>

<script>
  // ── Marked 설정 ──
  marked.setOptions({
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
      }
      return hljs.highlightAuto(code).value;
    },
    gfm: true,
    breaks: false,
    pedantic: false,
  });

  // ── 유틸 ──
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function isRecent(dateStr) {
    return (Date.now() - new Date(dateStr).getTime()) < 7 * 86400 * 1000;
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  // ── State ──
  let currentIndex = -1;
  const logs = Array.isArray(window.SESSION_LOGS) ? window.SESSION_LOGS : [];

  // ── 사이드바 렌더 ──
  function buildSidebar() {
    const listEl = document.getElementById('js-list');
    const metaEl = document.getElementById('js-meta');
    const statsEl = document.getElementById('js-stats');

    if (!logs.length) {
      listEl.innerHTML = `
        <div style="padding:24px 16px; text-align:center; color:var(--text-muted); font-size:12px; line-height:1.8;">
          로그 없음<br>
          <code style="font-size:11px;">make viewer</code> 를 실행하세요
        </div>`;
      return;
    }

    const oldest = logs[logs.length - 1].date;
    const newest = logs[0].date;

    metaEl.textContent = `총 ${logs.length}개`;
    statsEl.innerHTML = `
      <div class="stat"><span class="stat-dot"></span>${logs.length}개 세션</div>
      <div class="stat">${oldest} ~ ${newest}</div>
    `;

    listEl.innerHTML = logs.map((log, i) => `
      <div class="session-item" id="item-${i}" onclick="selectLog(${i})">
        <div class="item-date">
          ${esc(log.date)}
          ${isRecent(log.date) ? '<span class="recent-dot" title="최근 7일 이내"></span>' : ''}
        </div>
        ${log.scope ? `<div class="item-scope">${esc(log.scope)}</div>` : ''}
        ${log.branch ? `<div class="item-branch">⎇ ${esc(log.branch)}</div>` : ''}
      </div>
    `).join('');
  }

  // ── 컨텐츠 렌더 ──
  function selectLog(index) {
    if (index < 0 || index >= logs.length) return;
    currentIndex = index;
    const log = logs[index];

    // 사이드바 활성화
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
    const activeItem = document.getElementById(`item-${index}`);
    if (activeItem) {
      activeItem.classList.add('active');
      activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    // 마크다운 렌더
    const htmlContent = marked.parse(log.content);

    const mainEl = document.getElementById('js-main');
    mainEl.innerHTML = `
      <div class="content-hd">
        <div class="content-hd-title">${esc(log.title)}</div>
        <div class="content-hd-badges">
          <span class="badge badge-blue">📅 ${formatDate(log.date)}</span>
          ${log.branch ? `<span class="badge badge-green">⎇ ${esc(log.branch)}</span>` : ''}
          <span class="badge badge-purple">📄 ${esc(log.filename)}</span>
        </div>
      </div>
      <div class="content-scroll">
        <div class="content-body fade-in">
          <div class="md">${htmlContent}</div>
        </div>
      </div>
    `;

    // 코드 하이라이팅
    mainEl.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  }

  // ── 키보드 탐색 ──
  document.addEventListener('keydown', e => {
    if (!logs.length) return;
    if (e.key === 'ArrowDown' || e.key === 'j') {
      e.preventDefault();
      selectLog(Math.min(currentIndex + 1, logs.length - 1));
    } else if (e.key === 'ArrowUp' || e.key === 'k') {
      e.preventDefault();
      selectLog(Math.max(currentIndex - 1, 0));
    } else if (e.key === 'Enter' && currentIndex >= 0) {
      document.getElementById('js-main').querySelector('.content-scroll')?.scrollTo({ top: 0 });
    }
  });

  // ── 초기화 ──
  buildSidebar();
  if (logs.length > 0) selectLog(0);
</script>
</body>
</html>
