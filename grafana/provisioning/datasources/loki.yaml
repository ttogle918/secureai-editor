apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      # Trace ID 상관관계 — Jaeger 연동
      derivedFields:
        - name: TraceID
          matcherRegex: 'trace_id=([a-f0-9]+)'
          url: 'http://localhost:16686/trace/${__value.raw}'
          urlDisplayLabel: 'View in Jaeger'
