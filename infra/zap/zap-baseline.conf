# ZAP Baseline Scan 설정
# 사용 방법:
#   docker compose --profile zap run --rm zap   (make zap-scan 로 실행 권장)
#
# 이 파일은 zap-baseline.py -c 옵션으로 전달됩니다.
# 룰별 등급은 rules.tsv 에서 관리합니다.
#
# 스캔 동작:
#   - timeout : 60분 (복잡한 SPA는 시간이 더 소요될 수 있음)
#   - 크롤러   : Ajax Spider 미사용 (baseline은 정적 크롤만)
#   - 인증     : 없음 (인증 전 공개 엔드포인트만 스캔)
#               인증 후 스캔이 필요하면 full scan 사용 (SCAN_TYPE=full)
#
# 리포트 경로 (컨테이너 내부 → 호스트 마운트):
#   /zap/wrk/reports/zap-report.html
#   /zap/wrk/reports/zap-report.json
#
# [ruleId]\t[IGNORE|WARN|FAIL]\t[reason]
# 세부 룰은 rules.tsv 파일 참조
