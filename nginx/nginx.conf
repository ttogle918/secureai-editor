# ──────────────────────────────────────────────────────────────────
# SecureAI Engine — Nginx API Gateway 설정
#
# Rate Limiting: 클라이언트 IP 기준 (binary_remote_addr 사용으로 메모리 절약)
#   - api zone : 100 req/min, burst=20 (백엔드/AI 엔진 공통)
#   - ai zone  : 10  req/min, burst=10 (AI 엔진 전용 — 비용 제한)
# SSL: TLSv1.2 + TLSv1.3 전용 (TLSv1.0/1.1 비활성화)
#      개발: 자체 서명 인증서 (nginx/certs/)
# ──────────────────────────────────────────────────────────────────

# Rate Limiting Zone 정의
# binary_remote_addr: IPv4 4바이트 / IPv6 16바이트 (string 대비 메모리 효율)
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=ai:10m  rate=10r/m;

# ── HTTP: 80 → 443 강제 리다이렉트 ────────────────────────────────
server {
    listen 80;
    server_name _;

    # 301 Permanent Redirect — HTTPS로 강제 전환
    return 301 https://$host$request_uri;
}

# ── HTTPS: 443 메인 서버 ──────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # ── SSL 설정 ──────────────────────────────────────────────────
    # 개발 환경: 자체 서명 인증서 사용
    # 프로덕션: Let's Encrypt 인증서로 교체 (docker-compose.prod.yml 참고)
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # TLSv1.0, TLSv1.1 완전 비활성화 — 알려진 취약점(POODLE, BEAST) 차단
    ssl_protocols TLSv1.2 TLSv1.3;

    # aNULL (익명 키 교환, 중간자 공격 취약), MD5 (해시 충돌) 비활성화
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 세션 재사용으로 핸드셰이크 오버헤드 감소
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── 보안 헤더 ─────────────────────────────────────────────────
    # Spring Security에서도 설정하지만, Nginx에서 중복 강화
    # (프록시 경유 시 Spring이 응답 헤더를 누락하는 경우 대비)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "DENY"                                always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # ── Backend API 라우팅 (/api/) ────────────────────────────────
    # /api/workspace/ 는 더 구체적인 location이므로 아래 블록보다 우선 매칭됨
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 연결 타임아웃 설정 (긴 분석 작업 대비)
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }

    # ── Workspace API 라우팅 (/api/workspace/) ─────────────────────
    # /api/ 하위이지만 명시적으로 분리 — 향후 별도 서비스 분리 시 유연성 확보
    location /api/workspace/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }

    # ── AI Engine 라우팅 (/ai/) ───────────────────────────────────
    # AI 추론 비용 제한을 위해 별도 rate limit zone 적용
    location /ai/ {
        limit_req zone=ai burst=10 nodelay;

        proxy_pass         http://ai_engine:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # AI 분석은 응답 시간이 길 수 있으므로 타임아웃 확장
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    60s;
    }

    # ── Webhook 라우팅 (/webhooks/) ───────────────────────────────
    # GitHub 등 외부 웹훅: Rate Limit 제외 (GitHub IP는 신뢰 소스)
    location /webhooks/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # Docker 내부 DNS — frontend 서비스가 없을 때도 nginx가 시작되도록 동적 리졸브
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Frontend (기본 라우트) ─────────────────────────────────────
    # Next.js App Router — 위 location 블록에 매칭되지 않는 모든 요청
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass         $frontend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket 지원 (Next.js HMR, 실시간 기능)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
