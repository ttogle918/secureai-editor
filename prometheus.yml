global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "secureai-backend"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]

  - job_name: "secureai-ai-engine"
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-engine:8000"]
